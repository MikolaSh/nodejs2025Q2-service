version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    container_name: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homelibrary
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  app:
    build: .
    container_name: nest-app
    restart: always
    ports:
      - '4000:4000'
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - backend
    volumes:
      - /app/node_modules

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
